<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CreditGuard — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #05060f;
    --surface: #0d0f1e;
    --card: #12152a;
    --border: rgba(99,115,255,0.18);
    --accent: #6373ff;
    --accent2: #ff6b6b;
    --text: #e8eaf6;
    --muted: #8892b0;
    --success: #43e97b;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(99,115,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,115,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 48px 48px; }
  }

  /* Glowing orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    animation: float 8s ease-in-out infinite;
    pointer-events: none;
  }
  .orb1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: 3s; }
  @keyframes float {
    0%,100% { transform: translate(0,0); }
    50% { transform: translate(30px, -30px); }
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 440px;
    padding: 16px;
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.6s ease;
  }
  .logo-icon {
    font-size: 48px;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px var(--accent));
  }
  .logo h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 60px rgba(99,115,255,0.08), 0 24px 48px rgba(0,0,0,0.4);
    animation: fadeUp 0.6s ease 0.1s both;
  }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.25s;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px rgba(99,115,255,0.4);
  }

  .form-group { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,115,255,0.15);
  }
  input::placeholder { color: #3a3f5c; }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(99,115,255,0.45);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary.loading::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shimmer 1s infinite;
  }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

  .msg {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.88rem;
    margin-bottom: 16px;
    display: none;
    animation: fadeIn 0.3s;
  }
  .msg.error { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); color: #ff9999; }
  .msg.success { background: rgba(67,233,123,0.1); border: 1px solid rgba(67,233,123,0.3); color: var(--success); }

  .register-form { display: none; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  <div class="logo">
    <div class="logo-icon">💳</div>
    <h1>CreditGuard</h1>
    <p>AI-Powered Default Prediction System</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Create Account</button>
    </div>

    <div id="msgBox" class="msg"></div>

    <!-- LOGIN FORM -->
    <div class="login-form" id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="Enter your username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" id="loginBtn" onclick="doLogin()">Sign In →</button>
    </div>

    <!-- REGISTER FORM -->
    <div class="register-form" id="registerForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUser" placeholder="Choose a username"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPass" placeholder="Create a strong password"/>
      </div>
      <button class="btn-primary" id="regBtn" onclick="doRegister()">Create Account →</button>
    </div>
  </div>
</div>

<script>
  let activeTab = 'login';

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', (tab==='login' && i===0)||(tab==='register' && i===1));
    });
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    hideMsg();
  }

  function showMsg(text, type) {
    const b = document.getElementById('msgBox');
    b.textContent = text;
    b.className = `msg ${type}`;
    b.style.display = 'block';
  }
  function hideMsg() {
    document.getElementById('msgBox').style.display = 'none';
  }

  async function doLogin() {
    const btn = document.getElementById('loginBtn');
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value.trim();
    if (!username || !password) return showMsg('Please fill in all fields.', 'error');
    btn.classList.add('loading');
    btn.disabled = true;
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action:'login', username, password})
    });
    const data = await res.json();
    btn.classList.remove('loading'); btn.disabled = false;
    if (data.success) {
      showMsg('Welcome back! Redirecting…', 'success');
      setTimeout(() => window.location.href = '/predict-page', 800);
    } else {
      showMsg(data.message || 'Login failed.', 'error');
    }
  }

  async function doRegister() {
    const btn = document.getElementById('regBtn');
    const username = document.getElementById('regUser').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPass').value.trim();
    if (!username || !password) return showMsg('Username and password are required.', 'error');
    btn.classList.add('loading'); btn.disabled = true;
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action:'register', username, email, password})
    });
    const data = await res.json();
    btn.classList.remove('loading'); btn.disabled = false;
    if (data.success) {
      showMsg('Account created! Redirecting…', 'success');
      setTimeout(() => window.location.href = '/predict-page', 800);
    } else {
      showMsg(data.message || 'Registration failed.', 'error');
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') activeTab === 'login' ? doLogin() : doRegister();
  });
</script>
</body>
</html>
